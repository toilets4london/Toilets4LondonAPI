{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Suggested Toilets</title>
    <link rel="stylesheet" href="{% static 'css/review_suggestions.css' %}">
</head>
<body>
    <header class="page-header">
        <h1>Review Suggested Toilets</h1>
        <span>Logged in as {{ user.email }} &middot; <a href="/admin/">Admin</a></span>
    </header>

    {% csrf_token %}

    <div class="review-container">
        <div class="sidebar">
            <h2>Suggestions ({{ suggestions_count }})</h2>
            <div id="suggestion-list">
                {% if suggestions_count == 0 %}
                <div class="empty-state">No pending suggestions to review.</div>
                {% endif %}
            </div>
        </div>

        <div class="main-panel">
            <input id="map-search" type="text" placeholder="Search for a location...">
            <div id="map"></div>

            <div id="approval-form" style="display: none;">
                <h2>Add Toilet</h2>
                <p id="suggestion-details" class="suggestion-details-text"></p>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="form-latitude">Latitude</label>
                        <input type="number" id="form-latitude" step="any">
                    </div>
                    <div class="form-group half">
                        <label for="form-longitude">Longitude</label>
                        <input type="number" id="form-longitude" step="any">
                    </div>
                </div>

                <div class="form-group">
                    <label for="form-address">Address</label>
                    <input type="text" id="form-address" placeholder="Auto-populated from location...">
                </div>

                <div class="form-group">
                    <label for="form-name">Name</label>
                    <input type="text" id="form-name" placeholder="e.g. Public Toilet, Costa Coffee">
                </div>

                <div class="form-group">
                    <label for="form-borough">Borough</label>
                    <select id="form-borough">
                        <option value="">Other</option>
                        {% for borough in boroughs %}
                        <option value="{{ borough }}">{{ borough }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="form-opening-hours">Opening Hours</label>
                    <input type="text" id="form-opening-hours" placeholder="e.g. Mon-Fri 8am-6pm">
                </div>

                <div class="form-row">
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="form-wheelchair">
                        <label for="form-wheelchair">Wheelchair accessible</label>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="form-baby-change">
                        <label for="form-baby-change">Baby change</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="form-fee">Fee</label>
                    <input type="text" id="form-fee" value="Free">
                </div>

                <div class="form-group">
                    <label for="form-data-source">Data Source</label>
                    <input type="text" id="form-data-source" value="App upload">
                </div>

                <input type="hidden" id="form-suggestion-id">

                <div class="button-row">
                    <button type="button" class="btn-approve" onclick="approveSuggestion()">Approve &amp; Add Toilet</button>
                    <button type="button" class="btn-dismiss" onclick="dismissSuggestion()">Dismiss</button>
                </div>
            </div>

            <div id="message-bar" class="message-bar" style="display: none;"></div>
        </div>
    </div>

    <script>
        var suggestions = {{ suggestions_json|safe }};
    </script>
    <script src="{% static 'js/review_suggestions.js' %}"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ maps_key }}&libraries=places&callback=initMap" async defer></script>
</body>
</html>
